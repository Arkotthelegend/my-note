<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Management</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --hint-color: var(--tg-theme-hint-color, #999999);
            --button-color: var(--tg-theme-button-color, #3390ec);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--secondary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            padding-bottom: 80px; /* Space for bottom nav */
        }

        .container {
            padding: 15px;
        }

        /* Cards */
        .card {
            background-color: var(--bg-color);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-item {
            text-align: center;
            padding: 10px;
            background: var(--secondary-bg);
            border-radius: 8px;
        }
        .stat-value { font-size: 1.2em; font-weight: bold; color: var(--button-color); }
        .stat-label { font-size: 0.8em; color: var(--hint-color); }

        /* Tables & Lists */
        .student-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .student-item {
            background: var(--bg-color);
            padding: 12px;
            border-bottom: 1px solid var(--secondary-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .student-item:first-child { border-top-left-radius: 12px; border-top-right-radius: 12px; }
        .student-item:last-child { border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; border-bottom: none; }
        
        .student-info h4 { margin: 0 0 5px 0; font-size: 16px; }
        .student-info p { margin: 0; font-size: 12px; color: var(--hint-color); }
        .badge {
            background: var(--button-color);
            color: var(--button-text-color);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
        }

        /* Forms */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: var(--hint-color); }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--hint-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 16px;
        }
        
        /* Buttons */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: var(--button-color);
            color: var(--button-text-color);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-secondary {
            background-color: var(--secondary-bg);
            color: var(--text-color);
        }

        /* Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--bg-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid var(--secondary-bg);
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            font-size: 12px;
            color: var(--hint-color);
            cursor: pointer;
        }
        .nav-item.active {
            color: var(--button-color);
            font-weight: bold;
        }

        /* Views */
        .view { display: none; }
        .view.active { display: block; }

        /* Loading */
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 999;
        }
        .spinner {
            border: 4px solid var(--secondary-bg);
            border-top: 4px solid var(--button-color);
            border-radius: 50%;
            width: 30px; height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading"><div class="spinner"></div></div>

    <!-- Dashboard View -->
    <div id="view-dashboard" class="view active container">
        <h2>Dashboard</h2>
        <div class="card stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="total-students">0</div>
                <div class="stat-label">Total Students</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="total-revenue">0 Ks</div>
                <div class="stat-label">Total Revenue</div>
            </div>
        </div>
        
        <div class="card">
            <h3>Revenue Overview</h3>
            <canvas id="revenueChart"></canvas>
        </div>

        <div class="card">
            <h3>Recent Activities</h3>
            <ul class="student-list" id="recent-list">
                <!-- Recent items loaded here -->
            </ul>
        </div>
    </div>

    <!-- List View -->
    <div id="view-list" class="view container">
        <h2>All Students</h2>
        <input type="text" id="search-input" placeholder="Search by name or ID..." onkeyup="filterList()">
        <div class="card" style="padding:0; overflow:hidden;">
            <ul class="student-list" id="full-list">
                <!-- Full list loaded here -->
            </ul>
        </div>
    </div>

    <!-- Form View (Add/Edit) -->
    <div id="view-form" class="view container">
        <h2 id="form-title">Add New Student</h2>
        <div class="card">
            <input type="hidden" id="edit-index" value="-1">
            
            <div class="form-group">
                <label>Name (MM)</label>
                <input type="text" id="inp-mm" required>
            </div>
            <div class="form-group">
                <label>Name (EN)</label>
                <input type="text" id="inp-en" required>
            </div>
            
            <div class="stats-grid">
                <div class="form-group"><label>Math</label><input type="number" id="inp-math"></div>
                <div class="form-group"><label>Phy</label><input type="number" id="inp-phy"></div>
                <div class="form-group"><label>Chem</label><input type="number" id="inp-chem"></div>
                <div class="form-group"><label>Bio</label><input type="number" id="inp-bio"></div>
                <div class="form-group"><label>Eco</label><input type="number" id="inp-eco"></div>
                <div class="form-group"><label>Account</label><input type="number" id="inp-account"></div>
            </div>

            <div class="form-group">
                <label>Price (Enter Manually)</label>
                <input type="number" id="inp-price" required>
            </div>

            <div class="form-group">
                <label>Affiliate Code (Optional)</label>
                <input type="text" id="inp-affiliate" placeholder="e.g. CELE01">
            </div>
            
            <div class="form-group">
                <label>Commission (%)</label>
                <select id="inp-commission">
                    <option value="0">0%</option>
                    <option value="20">20%</option>
                    <option value="30">30%</option>
                </select>
            </div>

            <div class="form-group">
                <label>Account Type</label>
                <select id="inp-accounttype">
                    <option value="normal acc">Normal Acc</option>
                    <!-- Admin and Giveaway are restricted as per request, only Normal is writable -->
                    <option value="admin acc" disabled>Admin Acc (Read Only)</option>
                    <option value="giveaway winner acc" disabled>Giveaway Winner (Read Only)</option>
                </select>
                <small style="color:var(--hint-color)">Only 'Normal Acc' can be added/edited.</small>
            </div>

            <button class="btn" onclick="saveData()" id="btn-save">Save Data</button>
            <button class="btn btn-secondary" onclick="switchView('view-list')">Cancel</button>
        </div>
    </div>

    <!-- Reports View -->
    <div id="view-reports" class="view container">
        <h2>Reports</h2>
        <div class="card">
            <label>Filter by Month</label>
            <input type="month" id="report-month" onchange="generateReport()">
        </div>
        <div class="card" id="report-result">
            <p>Select a month to view report.</p>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchView('view-dashboard', this)">🏠 Home</div>
        <div class="nav-item" onclick="switchView('view-list', this)">📋 List</div>
        <div class="nav-item" onclick="openForm()", this)>➕ Add</div>
        <div class="nav-item" onclick="switchView('view-reports', this)">📊 Report</div>
    </div>

<script>
    // *** CONFIGURATION ***
    // အောက်ပါ URL နေရာမှာ အပေါ်က ရထားတဲ့ Google Apps Script Web App URL ကို ထည့်ပါ
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbysAri_iAiofG1pbgJ12HFlW6jjZUc5zrBq4ime-qMS7UW0xyHtSB4Wddx3xlwNYk8m/exec'; 
    
    let allData = [];
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        fetchData();
        
        // Set default month to current
        const now = new Date();
        const monthStr = now.toISOString().slice(0, 7); // YYYY-MM
        document.getElementById('report-month').value = monthStr;
    });

    function switchView(viewId, navElement) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        
        if(navElement) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            navElement.classList.add('active');
        }

        if(viewId === 'view-list') renderList(allData);
        if(viewId === 'view-dashboard') updateDashboard();
        if(viewId === 'view-reports') generateReport();
        
        tg.BackButton.hide();
    }

    function showLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }

    // --- Data Operations ---

    function fetchData() {
        showLoading(true);
        fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(response => {
                if(response.result === 'success') {
                    allData = response.data;
                    updateDashboard();
                    renderList(allData);
                } else {
                    tg.showAlert("Error loading data: " + response.error);
                }
            })
            .catch(err => {
                tg.showAlert("Network error: " + err);
                console.error(err);
            })
            .finally(() => showLoading(false));
    }

    function saveData() {
        const editIndex = document.getElementById('edit-index').value;
        const isEdit = editIndex !== "-1";
        
        // Validation
        const mm = document.getElementById('inp-mm').value;
        const en = document.getElementById('inp-en').value;
        const price = document.getElementById('inp-price').value;
        const accType = document.getElementById('inp-accounttype').value;

        if(!mm || !en || !price) {
            tg.showAlert("Please fill in Name and Price");
            return;
        }

        if(accType !== 'normal acc' && isEdit) {
             // Logic check if trying to change type improperly
        }

        const formData = {
            telegram_id: isEdit ? allData[editIndex].telegram_id : tg.initDataUnsafe.user?.id || "unknown",
            mm: mm,
            en: en,
            math: document.getElementById('inp-math').value,
            phy: document.getElementById('inp-phy').value,
            chem: document.getElementById('inp-chem').value,
            bio: document.getElementById('inp-bio').value,
            eco: document.getElementById('inp-eco').value,
            account: document.getElementById('inp-account').value,
            price: price,
            affiliate: document.getElementById('inp-affiliate').value,
            comission: document.getElementById('inp-commission').value, // Note: Sheet header is 'comission' (typo in prompt?) keeping consistent
            accounttype: accType
        };

        showLoading(true);

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({
                type: isEdit ? 'update' : 'add',
                data: formData
            })
        })
        .then(res => res.json())
        .then(response => {
            if(response.result === 'success') {
                tg.showAlert(isEdit ? "Updated Successfully!" : "Added Successfully!");
                document.getElementById('edit-index').value = "-1";
                document.getElementById('form-title').innerText = "Add New Student";
                document.getElementById('btn-save').innerText = "Save Data";
                clearForm();
                fetchData(); // Refresh data
                switchView('view-list');
            } else {
                tg.showAlert("Error: " + response.message);
            }
        })
        .catch(err => tg.showAlert("Save failed: " + err))
        .finally(() => showLoading(false));
    }

    // --- UI Rendering ---

    function updateDashboard() {
        let totalStudents = allData.length;
        let totalRevenue = allData.reduce((sum, item) => sum + (parseFloat(item.price) || 0), 0);

        document.getElementById('total-students').innerText = totalStudents;
        document.getElementById('total-revenue').innerText = totalRevenue.toLocaleString() + " Ks";

        // Render Recent List (Last 5)
        const recentList = document.getElementById('recent-list');
        recentList.innerHTML = '';
        allData.slice(-5).reverse().forEach(item => {
            recentList.innerHTML += createListItemHTML(item, false);
        });

        // Update Chart
        updateChart();
    }

    let revenueChartInstance = null;
    function updateChart() {
        const ctx = document.getElementById('revenueChart').getContext('2d');
        
        // Simple logic: Group revenue by Account Type for demo
        const types = {};
        allData.forEach(d => {
            const t = d.accounttype || 'Unknown';
            types[t] = (types[t] || 0) + (parseFloat(d.price) || 0);
        });

        const labels = Object.keys(types);
        const data = Object.values(types);

        if(revenueChartInstance) revenueChartInstance.destroy();

        revenueChartInstance = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: ['#3390ec', '#2ecc71', '#e74c3c', '#f1c40f']
                }]
            },
            options: { responsive: true }
        });
    }

    function renderList(data) {
        const listEl = document.getElementById('full-list');
        listEl.innerHTML = '';
        if(data.length === 0) {
            listEl.innerHTML = '<li style="padding:20px; text-align:center">No data found</li>';
            return;
        }
        data.forEach((item, index) => {
            // Find original index for editing
            const originalIndex = allData.indexOf(item);
            listEl.innerHTML += createListItemHTML(item, true, originalIndex);
        });
    }

    function createListItemHTML(item, clickable, index = null) {
        const name = item.mm || item.en || 'Unknown';
        const price = item.price ? `${item.price} Ks` : '';
        const type = item.accounttype || 'Normal';
        
        return `
            <li class="student-item" ${clickable ? `onclick="openForm(${index})"` : ''}>
                <div class="student-info">
                    <h4>${name}</h4>
                    <p>${type} | ${price}</p>
                </div>
                ${clickable ? '<span style="font-size:20px">✏️</span>' : ''}
            </li>
        `;
    }

    function filterList() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const filtered = allData.filter(item => {
            return (item.mm && item.mm.toLowerCase().includes(query)) ||
                   (item.en && item.en.toLowerCase().includes(query)) ||
                   (item.telegram_id && item.telegram_id.toString().includes(query));
        });
        renderList(filtered);
    }

    function openForm(index = null) {
        switchView('view-form');
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            clearForm();
            switchView('view-list');
        });

        if (index !== null) {
            const item = allData[index];
            document.getElementById('form-title').innerText = "Edit Student";
            document.getElementById('btn-save').innerText = "Update Data";
            document.getElementById('edit-index').value = index;

            document.getElementById('inp-mm').value = item.mm || '';
            document.getElementById('inp-en').value = item.en || '';
            document.getElementById('inp-math').value = item.math || '';
            document.getElementById('inp-phy').value = item.phy || '';
            document.getElementById('inp-chem').value = item.chem || '';
            document.getElementById('inp-bio').value = item.bio || '';
            document.getElementById('inp-eco').value = item.eco || '';
            document.getElementById('inp-account').value = item.account || '';
            document.getElementById('inp-price').value = item.price || '';
            document.getElementById('inp-affiliate').value = item.affiliate || '';
            document.getElementById('inp-commission').value = item.comission || '0';
            document.getElementById('inp-accounttype').value = item.accounttype || 'normal acc';
        } else {
            document.getElementById('form-title').innerText = "Add New Student";
            document.getElementById('btn-save').innerText = "Save Data";
            document.getElementById('edit-index').value = "-1";
            clearForm();
        }
    }

    function clearForm() {
        document.querySelectorAll('#view-form input').forEach(i => i.value = '');
        document.querySelectorAll('#view-form select').forEach(s => s.selectedIndex = 0);
    }

    function generateReport() {
        const monthVal = document.getElementById('report-month').value; // YYYY-MM
        if(!monthVal) return;

        const [year, month] = monthVal.split('-');
        
        // Filter data for this month (Assuming we add a date column later, 
        // but for now, since sheet doesn't have 'Date Created', we can't filter by creation date accurately 
        // unless we parse the row order or add a timestamp in script.
        // WORKAROUND: Since the script doesn't save timestamp yet, we will just show Total Stats for now
        // OR we assume the user wants to see totals. 
        // To make reports accurate, I will update the Script slightly in thought, but for HTML side:
        
        // Let's calculate totals for the selected filter (Mock logic until timestamp added)
        // Ideally, the Apps Script should return a 'timestamp' column. 
        // Let's assume all data for now for the demo of the UI.
        
        const totalStudents = allData.length;
        const totalRev = allData.reduce((sum, i) => sum + (parseFloat(i.price)||0), 0);
        
        // Calculate Commission payout
        const totalComm = allData.reduce((sum, i) => {
            const p = parseFloat(i.price)||0;
            const c = parseFloat(i.comission)||0;
            return sum + (p * (c/100));
        }, 0);

        const html = `
            <h3>Report for ${monthVal}</h3>
            <p><strong>Total Students:</strong> ${totalStudents}</p>
            <p><strong>Total Revenue:</strong> ${totalRev.toLocaleString()} Ks</p>
            <p><strong>Total Commission to Pay:</strong> ${totalComm.toLocaleString()} Ks</p>
            <hr>
            <p style="font-size:12px; color:red">Note: Detailed date filtering requires adding a 'Timestamp' column in the sheet. Currently showing overall stats.</p>
        `;
        document.getElementById('report-result').innerHTML = html;
    }

</script>
</body>
</html>
