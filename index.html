<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Course Registration</title>
    <!-- Telegram Web App JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: var(--tg-theme-bg-color, #f4f4f9); color: var(--tg-theme-text-color, #333); }
        .container { max-width: 400px; margin: 0 auto; background: var(--tg-theme-secondary-bg-color, #fff); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #0088cc; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .checkbox-group label { display: flex; align-items: center; font-weight: normal; background: #eef; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        button { width: 100%; padding: 12px; background-color: #0088cc; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:disabled { background-color: #aaa; }
        #statusMessage { text-align: center; margin-top: 15px; font-weight: bold; }
        .error { color: red; }
        .success { color: green; }
        #appContent, #accessDenied { display: none; }
    </style>
</head>
<body>

    <div id="accessDenied">
        <h2 style="color: red;">Access Denied</h2>
        <p style="text-align: center;">You are not authorized to view this admin panel.</p>
    </div>

    <div class="container" id="appContent">
        <h2>Admin Panel</h2>
        <div class="form-group">
            <label for="userId">User Telegram ID:</label>
            <input type="text" id="userId" placeholder="e.g., 8432363664" required>
        </div>

        <div class="form-group">
            <label>Select Subjects:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" value="mm"> MM</label>
                <label><input type="checkbox" value="en"> EN</label>
                <label><input type="checkbox" value="math"> MATH</label>
                <label><input type="checkbox" value="phy"> PHY</label>
                <label><input type="checkbox" value="chem"> CHEM</label>
                <label><input type="checkbox" value="bio"> BIO</label>
                <label><input type="checkbox" value="eco"> ECO</label>
                <label><input type="checkbox" value="all"> ALL</label>
            </div>
        </div>

        <div class="form-group">
            <label for="months">Duration:</label>
            <select id="months">
                <option value="1">1 Month</option>
                <option value="2">2 Months</option>
                <option value="3">3 Months</option>
                <option value="6">6 Months</option>
                <option value="12">1 Year</option>
            </select>
        </div>

        <button id="submitBtn" onclick="submitData()">Add / Update User</button>
        <div id="statusMessage"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // အက်ပ်ကို အပြည့်ဖွင့်ရန်

        // သင့်ရဲ့ App Script Web App URL ကို ဒီမှာထည့်ပါ
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzpLj-xBdXWpXE1Iz8pZfR9epxxneznaKvE7tJHkfDwvBuLG4gFNnusWGYa9sFBz0I1/exec"; 
        
        // သင့်ရဲ့ Admin ID (App Script ထဲက ID နဲ့ တူရပါမယ်)
        const ADMIN_ID = 8432363664; 

        // Admin ဟုတ်မဟုတ် စစ်ဆေးခြင်း
        let currentUser = tg.initDataUnsafe?.user?.id;
        
        // Testing အတွက် Local မှာ Run ရင် အလုပ်လုပ်အောင် (Optional)
        if (!currentUser) currentUser = ADMIN_ID; 

        if (String(currentUser) === String(ADMIN_ID)) {
            document.getElementById('appContent').style.display = 'block';
        } else {
            document.getElementById('accessDenied').style.display = 'block';
        }

        async function submitData() {
            const userId = document.getElementById('userId').value;
            const months = document.getElementById('months').value;
            
            // ရွေးထားတဲ့ ဘာသာရပ်တွေကို ယူခြင်း
            const checkboxes = document.querySelectorAll('.checkbox-group input[type="checkbox"]:checked');
            const subjects = Array.from(checkboxes).map(cb => cb.value);

            if (!userId) {
                showMessage("Please enter a User ID.", "error");
                return;
            }
            if (subjects.length === 0) {
                showMessage("Please select at least one subject.", "error");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "Processing...";
            showMessage("Sending data to sheet...", "");

            const payload = {
                admin_id: currentUser,
                user_id: userId,
                subjects: subjects,
                months: months
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8', // CORS ကိုရှောင်ရန် text/plain သုံးပါသည်
                    },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.status === "success") {
                    showMessage(result.message, "success");
                    // Form ကို ပြန်ရှင်းမည်
                    document.getElementById('userId').value = '';
                    checkboxes.forEach(cb => cb.checked = false);
                    document.getElementById('months').value = '1';
                } else {
                    showMessage(result.message, "error");
                }
            } catch (error) {
                showMessage("Connection error. Please try again.", "error");
            } finally {
                btn.disabled = false;
                btn.innerText = "Add / Update User";
            }
        }

        function showMessage(msg, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerText = msg;
            statusDiv.className = type;
        }
    </script>
</body>
</html>
