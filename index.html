<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Subscription Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      padding: 12px;
    }
    .header {
      background: linear-gradient(135deg, var(--tg-theme-button-color, #3390ec), #1a73c7);
      color: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 12px;
      text-align: center;
    }
    .header h1 { font-size: 22px; margin-bottom: 4px; }
    .card {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--tg-theme-button-color, #3390ec);
    }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn-primary {
      background: var(--tg-theme-button-color, #3390ec);
      color: white;
    }
    .btn-secondary {
      background: #f5f5f5;
      color: #000;
      border: 2px solid var(--tg-theme-button-color, #3390ec);
    }
    .subjects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .subject-item {
      background: white;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
    }
    .subject-item label {
      font-size: 12px;
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }
    .subject-item input {
      width: 100%;
      padding: 6px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
    }
    .commission-box {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 12px;
      border-radius: 8px;
      margin: 12px 0;
      text-align: center;
    }
    .commission-box strong {
      font-size: 20px;
      display: block;
      margin-top: 4px;
    }
    .error {
      background: #ffebee;
      color: #c62828;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .success {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .hidden { display: none; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }
    th {
      background: var(--tg-theme-button-color, #3390ec);
      color: white;
      font-weight: 700;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #f5f5f5;
      font-weight: 600;
      cursor: pointer;
    }
    .tab.active {
      background: var(--tg-theme-button-color, #3390ec);
      color: white;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-normal { background: #3390ec; color: white; }
    .badge-giveaway { background: #00aa00; color: white; }
    .loading { text-align: center; padding: 20px; color: #999; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📚 Subscription Manager</h1>
    <p id="userStatus">Loading...</p>
  </div>
  
  <div id="message"></div>
  
  <div class="tabs">
    <button class="tab active" onclick="showTab('add')">Add Subscription</button>
    <button class="tab" id="listTab" onclick="showTab('list')">View All</button>
  </div>
  
  <!-- Add Subscription Form -->
  <div id="addTab" class="card">
    <div class="card-title">➕ Add New Subscription</div>
    
    <div class="form-group">
      <label>Telegram ID *</label>
      <input type="number" id="telegramId" placeholder="Enter user's Telegram ID">
    </div>
    
    <div class="card-title" style="margin-top: 16px;">📚 Select Subjects & Months</div>
    <div class="subjects-grid">
      <div class="subject-item">
        <label>MM (Months)</label>
        <input type="number" id="mm" placeholder="0" min="0">
      </div>
      <div class="subject-item">
        <label>EN (Months)</label>
        <input type="number" id="en" placeholder="0" min="0">
      </div>
      <div class="subject-item">
        <label>Math (Months)</label>
        <input type="number" id="math" placeholder="0" min="0">
      </div>
      <div class="subject-item">
        <label>Physics (Months)</label>
        <input type="number" id="phy" placeholder="0" min="0">
      </div>
      <div class="subject-item">
        <label>Chemistry (Months)</label>
        <input type="number" id="chem" placeholder="0" min="0">
      </div>
      <div class="subject-item">
        <label>Biology (Months)</label>
        <input type="number" id="bio" placeholder="0" min="0">
      </div>
      <div class="subject-item">
        <label>Economics (Months)</label>
        <input type="number" id="eco" placeholder="0" min="0">
      </div>
      <div class="subject-item">
        <label>All (Months)</label>
        <input type="number" id="all" placeholder="0" min="0">
      </div>
    </div>
    
    <div class="form-group" style="margin-top: 12px;">
      <label>Account Type *</label>
      <select id="accountType">
        <option value="normal acc">Normal Account</option>
        <option value="giveaway winner acc">Giveaway Winner</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>Price (MMK) * <small>(Cannot be changed later)</small></label>
      <input type="number" id="price" placeholder="Enter price" oninput="calculateCommission()">
    </div>
    
    <div class="form-group">
      <label>Affiliate Code (Optional)</label>
      <input type="text" id="affiliate" placeholder="Enter affiliate code" oninput="calculateCommission()">
    </div>
    
    <div class="form-group">
      <label>Commission % (If affiliate)</label>
      <select id="commission" onchange="calculateCommission()">
        <option value="0">0%</option>
        <option value="20">20%</option>
        <option value="30">30%</option>
      </select>
    </div>
    
    <div class="commission-box hidden" id="commissionBox">
      Commission to Pay:
      <strong id="commissionAmount">0 MMK</strong>
    </div>
    
    <button class="btn btn-primary" onclick="addSubscription()">💾 Save Subscription</button>
  </div>
  
  <!-- List View -->
  <div id="listTab" class="card hidden">
    <div class="card-title">📋 All Subscriptions</div>
    <div id="listContent" class="loading">Loading...</div>
  </div>

  <script>
    // ⚠️ REPLACE WITH YOUR GOOGLE APPS SCRIPT URL
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwCKkIpLMa7Q3696WBLm8qaKIGcAxtwK7YRsYYxFE94ieutKbNwVOTJu5fh6ry925K_/exec';
    
    var tg = window.Telegram.WebApp;
    tg.expand();
    
    var currentUserId = tg.initDataUnsafe.user?.id?.toString() || '';
    var isAdmin = false;
    
    window.onload = function() {
      if (!currentUserId) {
        showMessage('Please open from Telegram', 'error');
        return;
      }
      checkAdmin();
    };
    
    async function apiCall(action, data) {
      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: action, ...data })
        });
        return await response.json();
      } catch (error) {
        return { success: false, message: 'Connection error: ' + error.message };
      }
    }
    
    async function checkAdmin() {
      const result = await apiCall('checkAdmin', { telegramId: currentUserId });
      if (result.success) {
        isAdmin = result.isAdmin;
        document.getElementById('userStatus').textContent = isAdmin ? '👑 Admin' : 'User';
        if (!isAdmin) {
          document.getElementById('listTab').style.display = 'none';
        }
      }
    }
    
    function calculateCommission() {
      var price = parseFloat(document.getElementById('price').value) || 0;
      var commission = parseFloat(document.getElementById('commission').value) || 0;
      var affiliate = document.getElementById('affiliate').value.trim();
      
      if (affiliate && commission > 0 && price > 0) {
        var amount = price * (commission / 100);
        document.getElementById('commissionBox').classList.remove('hidden');
        document.getElementById('commissionAmount').textContent = amount.toLocaleString() + ' MMK';
      } else {
        document.getElementById('commissionBox').classList.add('hidden');
      }
    }
    
    async function addSubscription() {
      var telegramId = document.getElementById('telegramId').value;
      var price = document.getElementById('price').value;
      
      if (!telegramId || !price) {
        showMessage('Telegram ID and Price are required', 'error');
        return;
      }
      
      var data = {
        telegramId: telegramId,
        mm: document.getElementById('mm').value || 0,
        en: document.getElementById('en').value || 0,
        math: document.getElementById('math').value || 0,
        phy: document.getElementById('phy').value || 0,
        chem: document.getElementById('chem').value || 0,
        bio: document.getElementById('bio').value || 0,
        eco: document.getElementById('eco').value || 0,
        all: document.getElementById('all').value || 0,
        accounttype: document.getElementById('accountType').value,
        price: parseFloat(price),
        affiliate: document.getElementById('affiliate').value.trim(),
        comission: parseFloat(document.getElementById('commission').value) || 0
      };
      
      showMessage('Saving...', 'success');
      const result = await apiCall('addSubscription', data);
      
      if (result.success) {
        showMessage(result.message + (result.commissionAmount ? ' | Commission: ' + result.commissionAmount + ' MMK' : ''), 'success');
        clearForm();
      } else {
        showMessage(result.message, 'error');
      }
    }
    
    function clearForm() {
      document.getElementById('telegramId').value = '';
      document.getElementById('mm').value = '';
      document.getElementById('en').value = '';
      document.getElementById('math').value = '';
      document.getElementById('phy').value = '';
      document.getElementById('chem').value = '';
      document.getElementById('bio').value = '';
      document.getElementById('eco').value = '';
      document.getElementById('all').value = '';
      document.getElementById('price').value = '';
      document.getElementById('affiliate').value = '';
      document.getElementById('commission').value = '0';
      document.getElementById('commissionBox').classList.add('hidden');
    }
    
    async function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('addTab').classList.add('hidden');
      document.getElementById('listTab').classList.add('hidden');
      
      if (tab === 'add') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('addTab').classList.remove('hidden');
      } else if (tab === 'list') {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('listTab').classList.remove('hidden');
        loadSubscriptions();
      }
    }
    
    async function loadSubscriptions() {
      const result = await apiCall('getAllSubscriptions', { telegramId: currentUserId });
      if (result.success && result.data) {
        displaySubscriptions(result.data);
      } else {
        document.getElementById('listContent').innerHTML = '<div class="error">' + result.message + '</div>';
      }
    }
    
    function displaySubscriptions(data) {
      if (data.length === 0) {
        document.getElementById('listContent').innerHTML = '<p>No subscriptions found</p>';
        return;
      }
      
      var html = '<table><thead><tr><th>Telegram ID</th><th>Type</th><th>Price</th><th>Affiliate</th><th>Commission</th></tr></thead><tbody>';
      
      data.forEach(function(sub) {
        var badgeClass = sub.accounttype === 'giveaway winner acc' ? 'badge-giveaway' : 'badge-normal';
        var commissionText = sub.comission > 0 ? sub.comission + '% (' + (sub.price * sub.comission / 100).toLocaleString() + ' MMK)' : '-';
        
        html += '<tr>' +
          '<td>' + sub.telegram_id + '</td>' +
          '<td><span class="badge ' + badgeClass + '">' + (sub.accounttype === 'giveaway winner acc' ? 'Giveaway' : 'Normal') + '</span></td>' +
          '<td>' + (sub.price || 0).toLocaleString() + '</td>' +
          '<td>' + (sub.affiliate || '-') + '</td>' +
          '<td>' + commissionText + '</td>' +
          '</tr>';
      });
      
      html += '</tbody></table>';
      document.getElementById('listContent').innerHTML = html;
    }
    
    function showMessage(msg, type) {
      var div = document.getElementById('message');
      div.innerHTML = '<div class="' + type + '">' + msg + '</div>';
      setTimeout(function() { div.innerHTML = ''; }, 4000);
    }
  </script>
</body>
</html>
